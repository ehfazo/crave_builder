name: 'PixelDrain Upload'
description: 'Uploads a file to PixelDrain'
inputs:
  filepath:
    description: 'Path to the file to upload'
    required: true
  api_key:
    description: 'PixelDrain API key'
    required: true
runs:
  using: 'composite'
  steps:
    - shell: bash
      run: |
        FILE="${{ inputs.filepath }}"
        if [ ! -f "$FILE" ]; then
          echo "Error: File $FILE not found!"
          exit 1
        fi

        echo "Uploading $FILE to PixelDrain..."
        RESPONSE=$(curl -s -u ":${{ inputs.api_key }}" -F "file=@$FILE" https://pixeldrain.com/api/file)
        FILE_ID=$(echo "$RESPONSE" | jq -r '.id')

        if [[ "$FILE_ID" != "null" && -n "$FILE_ID" ]]; then
          URL="https://pixeldrain.com/u/$FILE_ID"
          echo "Upload successful: $URL"
          echo "PIXELDRAIN_URL=$URL" >> $GITHUB_ENV
        else
          echo "Error: PixelDrain upload failed."
          echo "Response: $RESPONSE"
          exit 1
        fi