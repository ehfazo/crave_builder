name: 'Setup Repo Tool'
description: 'Install the Google repo tool if not already present'
runs:
  using: 'composite'
  steps:
    - shell: bash
      run: |
        if ! command -v repo >/dev/null 2>&1; then
          echo "Repo not found. Installing now..."
          mkdir -p ~/bin
          curl -Lf https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf "$(realpath ~/bin/repo)" "/usr/bin/repo"
          echo "Repo installation complete."
        else
          echo "Repo already installed."
        fi
