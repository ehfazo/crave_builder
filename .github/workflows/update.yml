name: Update vendored scripts

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-get-crave:
    name: Update get_crave.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest get_crave.sh
        run: |
          curl -sLf -o scripts/get_crave.sh https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update vendored get_crave.sh"
          title: "chore: update vendored get_crave.sh"
          body: "Weekly update of the vendored `get_crave.sh` script from upstream."
          branch: update/get-crave
          delete-branch: true
