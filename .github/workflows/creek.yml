name: Crave Builder
on:
  workflow_dispatch:
    # Various inputs to simplify usage of workflow.
    inputs:
      BASE_PROJECT:
        description: 'Choose a base project:'
        required: true
        default: 'LineageOS 22.1'
        type: choice
        options:
          - 'LineageOS 20.0'
          - 'LineageOS 21.0'
          - 'LineageOS 22.1'
          - 'ArrowOS 13.1'
          - 'DerpFest 14.0'
          - 'CipherOS 14'
          - 'PixelOS 15'
          - 'RisingOS 15 Revived'
          - 'LineageOS 18.1'
          - 'LineageOS 16.0'
          - 'CyanogenMOD 14.1'
          - 'AOSP'

      # PRODUCT VARIABLES
      PRODUCT_NAME:
        description: "Product to build:"
        required: true
        default: "creek"
      ROM_NAME:
        description: "Name of the ROM being built"
        required: true
        default: "lineage"
      DEVICE:
        description: "Device's codename:"
        required: true
        default: "creek"
      RELEASE:
        description: ""
        required: true
        default: "trunk_staging"
      BUILD_TYPE:
        description: 'Type of build:'
        required: true
        default: 'userdebug'
        type: choice
        options: 
        - 'eng'
        - 'userdebug'
        - 'user' 
      BUILD_DIFFERENT_ROM:
        description: "Command to initialize a different 'repo' project:"
        required: false
        default: "echo 'Build Starting!'"
     
      # LOCAL MANIFEST VARIABLES
      LOCAL_MANIFEST:
        description: "Personal local manifest [repository or raw]:"
        required: true
        default: 'https://github.com/ehfazo/local_manifest.git'
      LOCAL_MANIFEST_BRANCH:
        description: "Personal local manifest's branch:"
        required: false
        default: 'lineage-23.2'

      # OTHER VARIABLES
      REPO_INIT_URL:
        description: "Command to initialize 'repo' project:"
        required: true
        default: "https://github.com/LineageOS/android.git"
      REPO_INIT_BRANCH:
        description: "Branch to initialize 'repo' with:"
        required: true
        default: "lineage-23.2"
      BUILD_COMMAND:
        description: 'Command to be used for compiling:'
        required: true
        default: 'mka bacon'
      CLEAN_BUILD:
        description: 'Build with a clean workspace?'
        required: true
        default: 'no'
        type: choice
        options: 
        - 'yes'
        - 'no'

jobs:
  prepare:
    name: Prepare for Building
    runs-on: ubuntu-latest
    steps:
    - name: Check-out to repository
      uses: actions/checkout@v4

    - name: Check Credentials
      run: |
        if [[ -z "${{ secrets.CRAVE_TOKEN }}" || -z "${{ secrets.CRAVE_USERNAME }}" ]]; then
          echo "Crave Credentials Not Configured! Exiting..."
          exit 1
        fi
        bash scripts/env-checker.sh

    - name: Check Notifications && PixelDrain Credentials
      run: |
        if [[ -z "${{ secrets.TG_TOKEN }}" || -z "${{ secrets.TG_CHAT }}" ]]; then
          echo "Telegram Credentials Not Configured! Notifications will be disabled..."
        fi
        if [[ -z "${{ secrets.PIXELDRAIN_TOKEN }}" ]]; then
          echo "PixelDrain Credential Not Configured! Uploads will be disabled..."
        fi
    - name: Export Repo Initialization Command
      id: repo-init
      run: |
        echo "REPO_INIT= repo init -u ${{ github.event.inputs.REPO_INIT_URL }} -b ${{ github.event.inputs.REPO_INIT_BRANCH }} --depth=1" >> "$GITHUB_OUTPUT"
        export REPO_INIT="repo init -u ${{ github.event.inputs.REPO_INIT_URL }} -b ${{ github.event.inputs.REPO_INIT_BRANCH }} --depth=1"
        echo "REPO_INIT=$REPO_INIT" >> "$GITHUB_ENV"

    - name: Set Project variables
      id: proj-variables
      run: |
        case "${{ github.event.inputs.BASE_PROJECT }}" in
        "ArrowOS 13.1")
          export PROJECTFOLDER="/crave-devspaces/Arrow13"
          export PROJECTID="73"
          export REPO_URL="https://github.com/ArrowOS/android_manifest.git"

        ;;
        "DerpFest 14.0")
          export PROJECTFOLDER="/crave-devspaces/DerpFest14"
          export PROJECTID="64"
          export REPO_URL="https://github.com/DerpFest-AOSP/manifest.git"
        ;;
        "LineageOS 21.0")
          export PROJECTFOLDER="/crave-devspaces/Lineage21"
          export PROJECTID="72"
          export REPO_URL="https://github.com/LineageOS/android.git"
        ;;
        "LineageOS 22.1")
          export PROJECTFOLDER="/crave-devspaces/Lineage22"
          export PROJECTID="93"
          export REPO_URL="https://github.com/accupara/los22.git"
        ;;
        "LineageOS 20.0")
          export PROJECTFOLDER="/crave-devspaces/Lineage20"
          export PROJECTID="36"
          export REPO_URL="https://github.com/accupara/los20.git"
        ;;
        "CipherOS 14")
          export PROJECTFOLDER="/crave-devspaces/Cipher14"
          export PROJECTID="79"
          export REPO_URL="https://github.com/CipherOS/android_manifest.git"
        ;;
        "PixelOS 15")
          export PROJECTFOLDER="/crave-devspaces/Pixel15"
          export PROJECTID="82"
          export REPO_URL="https://github.com/PixelOS-AOSP/manifest.git"
        ;;
        "RisingOS 15 Revived")
          export PROJECTFOLDER="/crave-devspaces/Rising15"
          export PROJECTID="86"
          export REPO_URL="https://github.com/RisingOS-Revived/android.git"
        ;;
        "LineageOS 18.1")
          export PROJECTFOLDER="/crave-devspaces/Lineage18"
          export PROJECTID="85"
          export REPO_URL="https://github.com/accupara/los18.1.git"
        ;;
        "LineageOS 16.0")
          export PROJECTFOLDER="/crave-devspaces/Lineage16"
          export PROJECTID="81"
          export REPO_URL="https://github.com/accupara/los16.git"
        ;;
        "CyanogenMOD 14.1")
          export PROJECTFOLDER="/crave-devspaces/Cyanogen14"
          export PROJECTID="83"
          export REPO_URL="https://github.com/accupara/los-cm14.1.git"
        ;;
        "AOSP")
          export PROJECTFOLDER="/crave-devspaces/AOSP"
          export PROJECTID="35"
          export REPO_URL="https://android.googlesource.com/platform/manifest.git"
        ;;
        esac

        echo "REPO_URL=$REPO_URL" >> "$GITHUB_OUTPUT"

        LUNCH="lunch ${{ github.event.inputs.ROM_NAME }}_${{ github.event.inputs.DEVICE }}-${{ github.event.inputs.RELEASE }}-${{ github.event.inputs.BUILD_TYPE }}"



          if [[ "${{ github.event.inputs.LOCAL_MANIFEST }}" =~ \.xml(/)?$ ]]; then
            local_manifest_url="${{ github.event.inputs.LOCAL_MANIFEST }}"
            export local_manifest_url="${local_manifest_url%/}"  # remove trailing slash if it exists
            LOCAL_MANIFEST="mkdir -p .repo/local_manifests && rm -rf .repo/local_manifests/* || true && curl -o .repo/local_manifests/local_manifest.xml ${local_manifest_url}"
          else
            export LOCAL_MANIFEST="git clone ${{ github.event.inputs.LOCAL_MANIFEST }} --depth 1 -b ${{github.event.inputs.LOCAL_MANIFEST_BRANCH}} .repo/local_manifests"
          fi

        echo "Building on ${{ github.event.inputs.BASE_PROJECT }} project"
        echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_OUTPUT"
        echo "PROJECTID=$PROJECTID"  >> "$GITHUB_OUTPUT"
        echo "REPO_INIT=${{ steps.repo-init.outputs.REPO_INIT }}" >> "$GITHUB_OUTPUT"
        echo "REPO_URL=${{ steps.proj-variables.outputs.REPO_URL }}" >> "$GITHUB_OUTPUT"
        echo "LUNCH=$LUNCH" >> "$GITHUB_ENV"
        echo "LUNCH=$LUNCH" >> "$GITHUB_OUTPUT"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_ENV"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_OUTPUT"

    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Base Project: ${{ github.event.inputs.BASE_PROJECT }}"
        echo "Repo Init: ${{ steps.repo-init.outputs.REPO_INIT }}"
        echo "Local Manifest: ${{ github.event.inputs.LOCAL_MANIFEST }}"
        echo "Local Manifest Branch: ${{ github.event.inputs.LOCAL_MANIFEST_BRANCH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE }}"
        echo "Lunch Target: ${{ env.LUNCH }}"
        echo "Clean Build: ${{ github.event.inputs.CLEAN_BUILD }}"
        echo "::endgroup::"

        echo "Displaying Local Manifests"
        if [[ -z "${{ secrets.DISPLAY_FALSE }}" ]]; then
          bash -c "$LOCAL_MANIFEST"
          cat .repo/local_manifests/*.xml
        else
          echo "Displaying is disabled through secrets."
        fi

    outputs:
      PROJECTFOLDER: ${{ steps.proj-variables.outputs.PROJECTFOLDER }}
      PROJECTID: ${{ steps.proj-variables.outputs.PROJECTID }}
      REPO_INIT: ${{ steps.repo-init.outputs.REPO_INIT }}
      LUNCH: ${{ steps.proj-variables.outputs.LUNCH }}
      LOCAL_MANIFEST: ${{ steps.proj-variables.outputs.LOCAL_MANIFEST }}
      REPO_URL: ${{ steps.proj-variables.outputs.REPO_URL }}

  test:
    name: Test Local Manifests
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      # Accept Project Variables
    - name: Set Repo Project
      run: |
        PROJECTFOLDER="${{ needs.prepare.outputs.PROJECTFOLDER }}"
        PROJECTID="${{ needs.prepare.outputs.PROJECTID }}"
        REPO_INIT="${{ needs.prepare.outputs.REPO_INIT }}"
        LUNCH="${{ needs.prepare.outputs.LUNCH }}"
        LOCAL_MANIFEST="${{ needs.prepare.outputs.LOCAL_MANIFEST }}"

        echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_ENV"
        echo "PROJECTID=$PROJECTID"  >> "$GITHUB_ENV"
        echo "REPO_INIT=$REPO_INIT" >> "$GITHUB_ENV"
        echo "LUNCH=$LUNCH" >> "$GITHUB_ENV"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_ENV"

      # Download and configure 'repo'.
    - name: Configure the 'repo' environment
      run: |
        # Check if repo is already installed
        if ! command -v repo >/dev/null 2>&1; then
          echo "Repo not found. Installing now..."
          # Create bin directory if it doesn't exist
          mkdir -p ~/bin
          # Download repo script
          curl https://storage.googleapis.com/git-repo-downloads/repo >> ~/bin/repo
          # Make repo script executable
          chmod a+x ~/bin/repo
          # Create symbolic link to /usr/bin/repo
          sudo ln -sf "/home/$(whoami)/bin/repo" "/usr/bin/repo"
          echo "Repo installation complete."
        else
          echo "Repo already installed."
        fi
      continue-on-error: true
      
      # Generate 'git' credential in base of the workflow's author.
    - name: Set-up 'git' credential(s)
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      # Test Your Personal 'Local Manifests' against The ROM
    - name: Test Local Manifests
      if: ${{ github.event.inputs.BUILD_DIFFERENT_ROM != 'skip' }}
      run: |
        rm -rf tester
        mkdir tester
        cd tester 
        if [ "${{ github.event.inputs.BUILD_DIFFERENT_ROM }}" == "echo 'Build Starting!'" ]; then
          $REPO_INIT
        else
          ${{ github.event.inputs.BUILD_DIFFERENT_ROM }}
        fi 

        bash -c "$LOCAL_MANIFEST"

        timeout 1m repo sync --force-sync || { exit_code=$?; [ $exit_code -eq 124 ] || (echo "Error: Process failed with exit code $exit_code"; exit $exit_code); }
        du -csh . # Output Size when done
        rm -rf .repo
      timeout-minutes: 10
    outputs:
      PROJECTFOLDER: ${{ needs.prepare.outputs.PROJECTFOLDER }}
      PROJECTID: ${{ needs.prepare.outputs.PROJECTID }}
      REPO_INIT: ${{ needs.prepare.outputs.REPO_INIT }}
      LUNCH: ${{ needs.prepare.outputs.LUNCH }}
      REMOTE_URL: ${{ needs.prepare.outputs.REPO_URL }}
      LOCAL_MANIFEST: "${{ needs.prepare.outputs.LOCAL_MANIFEST }}"


  build:
    name: Build using foss.crave.io
    needs: test 
      # Change this to self-hosted after setting up devspace as github actions runner
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository_owner }}
    steps:
      # Accept Project Variables
    - name: Set Repo Project
      run: |
        PROJECTFOLDER="${{ needs.test.outputs.PROJECTFOLDER }}"
        PROJECTID="${{ needs.test.outputs.PROJECTID }}"
        REPO_INIT="${{ needs.test.outputs.REPO_INIT }}"
        LUNCH="${{ needs.test.outputs.LUNCH }}"
        LOCAL_MANIFEST="${{ needs.test.outputs.LOCAL_MANIFEST }}"

        echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_ENV"
        echo "PROJECTID=$PROJECTID"  >> "$GITHUB_ENV"
        echo "REPO_INIT=$REPO_INIT" >> "$GITHUB_ENV"
        echo "LUNCH=$LUNCH" >> "$GITHUB_ENV"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_ENV"

      # Create a project folder
    - name: Create Project Folders
      run: |
        echo "DCDEVSPACE status: ${DCDEVSPACE}"
        if [[ $DCDEVSPACE != *1* ]]; then
          
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s -- 

          mkdir -p ${HOME}/bin/
          mv ${PWD}/crave ${HOME}/bin/ 
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave; sudo chmod +x /usr/bin/crave 

          echo "Symlinking devspace folder"
          mkdir -p devspace
          sudo mkdir -p /crave-devspaces
          sudo ln -sf ${pwd}/devspace /crave-devspaces
          sudo chmod 777 /crave-devspaces
        else
          echo "We are already running in devspace... Skipping Symlinks"
        fi
        if grep -q "$PROJECTFOLDER" <(crave clone list --json | jq -r '.clones[]."Cloned At"') || [[ "${DCDEVSPACE}" == "1" ]]; then
          crave clone destroy -y $PROJECTFOLDER || echo "Error removing $PROJECTFOLDER"
        else          
        echo "Skipping removal"
        fi

        if [[ $DCDEVSPACE == *1* ]]; then
          crave clone create --projectID $PROJECTID $PROJECTFOLDER || echo "Crave clone create failed!"
        else
          mkdir $PROJECTFOLDER
        fi

      # Check-out in order to access the repository's files.
    - name: Check-out to repository
      uses: actions/checkout@v4

      # Set-up a spearate directory for the device.
    - name: Set-up workspace environment
      run: |
        mkdir ${{ github.event.inputs.DEVICE }}
        cd ${{ github.event.inputs.DEVICE }}
      continue-on-error: true

      # Initialize git remote in the device directory
    - name: Remote add
      id: remote-add
      run: |
        cd ${{ github.event.inputs.DEVICE }}
        EOF=$(dd if=/dev/urandom bs=1 count=8 2>/dev/null | od -An -tx1 | tr -d ' \n')
        echo "REMOTE_ADD<<$EOF" >> "$GITHUB_OUTPUT"
        echo "git init" >> "$GITHUB_OUTPUT"
        echo "if ! git remote get-url origin &>/dev/null; then" >> "$GITHUB_OUTPUT"
        echo "    git remote remove origin" >> "$GITHUB_OUTPUT"
        echo "    git remote add origin ${{ needs.test.outputs.REMOTE_URL }}" >> "$GITHUB_OUTPUT"
        echo "else" >> "$GITHUB_OUTPUT"
        echo "    git remote set-url origin ${{ needs.test.outputs.REMOTE_URL }}" >> "$GITHUB_OUTPUT"
        echo "fi" >> "$GITHUB_OUTPUT"
        echo "$EOF" >> "$GITHUB_OUTPUT"

      # Download and configure 'repo'.
    - name: Configure the 'repo' environment
      run: |
        # Check if repo is already installed
        if ! command -v repo >/dev/null 2>&1; then
          echo "Repo not found. Installing now..."
          # Create bin directory if it doesn't exist
          mkdir -p ~/bin
          # Download repo script
          curl https://storage.googleapis.com/git-repo-downloads/repo >> ~/bin/repo
          # Make repo script executable
          chmod a+x ~/bin/repo
          # Create symbolic link to /usr/bin/repo
          sudo ln -sf "/home/$(whoami)/bin/repo" "/usr/bin/repo"
          echo "Repo installation complete."
        else
          echo "Repo already installed."
        fi
      continue-on-error: true
      
      # Generate 'git' credential in base of the workflow's author.
    - name: Set-up 'git' credential(s)
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      # Send Build 'start' notification
    - name: Telegram Build Started
      continue-on-error: true
      run: |
        if [[ -z "${{ secrets.TG_TOKEN }}" || -z "${{ secrets.TG_CHAT }}" ]]; then
          echo "Telegram credentials not configured, skipping notification."
          exit 0
        fi
        MESSAGE="Crave Project: ${{ github.event.inputs.BASE_PROJECT }}%0A"
        MESSAGE+="Device: ${{ github.event.inputs.DEVICE }}%0A"
        MESSAGE+="Build has been queued%0A"
        MESSAGE+="Check Progress at:%0A"
        MESSAGE+="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TG_CHAT }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=Markdown" >/dev/null

      # Download and configure 'crave'.
    - name: Configure the 'crave' environment
      run: |
        echo "DCDEVSPACE status: ${DCDEVSPACE}"
        mkdir -p $PROJECTFOLDER/.repo/manifests
        if [[ $DCDEVSPACE == *1* ]]; then
          echo 'No need to set up crave, we are already running in devspace!'
        else
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ${PWD}/crave ${HOME}/bin/
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
          envsubst < ${PWD}/crave.conf.sample >> ${PWD}/crave.conf
          rm -rf ${PWD}/crave.conf.sample
          cp crave.conf $PROJECTFOLDER
        fi
        if [[ -z "${{ secrets.CUSTOM_YAML }}" ]]; then
          cp configs/crave/crave.yaml.aosp $PROJECTFOLDER/.repo/manifests/crave.yaml
          echo "No Custom Configuration Found, Using Template!"
        else
          touch $PROJECTFOLDER/.repo/manifests/crave.yaml || true
          echo "${{ secrets.CUSTOM_YAML }}" > $PROJECTFOLDER/.repo/manifests/crave.yaml
          echo "Custom Configuration Found!"
        fi
      env:
        CRAVE_USERNAME: ${{  secrets.CRAVE_USERNAME  }}
        CRAVE_TOKEN: ${{  secrets.CRAVE_TOKEN  }}

      # Initialize the previously choosen 'repo' project.
    - name: Set the 'crave' project
      run: |
        cd $PROJECTFOLDER
        echo "Running $REPO_INIT"
        $REPO_INIT

        if [ "${{ github.event.inputs.BUILD_DIFFERENT_ROM }}" == "echo 'Build Starting!'" ]; then
          export BUILD_DIFFERENT_ROM="$REPO_INIT"
          echo "Building $BUILD_DIFFERENT_ROM"
        else
          export BUILD_DIFFERENT_ROM="${{ github.event.inputs.BUILD_DIFFERENT_ROM }}"
          echo "Building $BUILD_DIFFERENT_ROM"
        fi
        echo "BUILD_DIFFERENT_ROM=$BUILD_DIFFERENT_ROM" >> "$GITHUB_ENV"
        echo "We will be building with $LUNCH"

      # Create a 'crave' job for building.
    - name: Start compilation through 'crave'
      if: ${{ github.event.inputs.BUILD_DIFFERENT_ROM != 'skip' }}
      run: |
        cd $PROJECTFOLDER

        if [ "${{ github.event.inputs.CLEAN_BUILD }}" == "yes" ]; then
           export CLEAN="--clean"
        fi

        if [[ -n "${{ secrets.PAID }}" ]]; then
           echo "Paid Build... Tokens will be consumed."
           export PAID="--platform aosp-silver"
        fi

        echo "Build is queued! Please wait for your build to start."
        echo "Check foss.crave.io Dashboard to see builds"
        echo "Running build's log will show up here!"


        crave ${{ secrets.CRAVE_FLAGS }} run --no-patch ${PAID} ${CLEAN} -- "
        echo '>>>> [STEP] Clean'
        remove=(
          .repo/local_manifests
          hardware/qcom-caf/common
          hardware/qcom-caf/sm6225/*
          device/xiaomi/*
          vendor/xiaomi/*
          vendor/lineage-priv/keys
          vendor/qcom/opensource/*
        )
        for folder in \"\${remove[@]}\"; do
          rm -rf \"\$folder\"
          echo \"    Cleaned: \$folder\"
        done && \
        # Clone local_manifests repository
        $BUILD_DIFFERENT_ROM ; \
        $LOCAL_MANIFEST && \

        # Sync the repositories
        if [ -f /usr/bin/resync ]; then
          /usr/bin/resync # For compatibility with Omansh's Docker image 
        else
          /opt/crave/resync.sh
        fi && \

        # Set up build environment
        export BUILD_USERNAME=${{ github.actor }} ; \
        export BUILD_HOSTNAME=crave ; \
        source build/envsetup.sh && \

        echo "Repository: ${{ github.repository }}"; \
        echo "Run ID: ${{ github.run_id }}"; \

        # Build the ROM
        $LUNCH && \
        make installclean && \
        ${{ github.event.inputs.BUILD_COMMAND }}"

      # Send Build 'status' notification (Success)
    - name: Telegram Build Succeeded
      if:  ${{ success() }}
      continue-on-error: true
      run: |
        if [[ -z "${{ secrets.TG_TOKEN }}" || -z "${{ secrets.TG_CHAT }}" ]]; then
          echo "Telegram credentials not configured, skipping notification."
          exit 0
        fi
        MESSAGE="Crave Project: ${{ github.event.inputs.BASE_PROJECT }}%0A"
        MESSAGE+="Device: ${{ github.event.inputs.DEVICE }}%0A"
        MESSAGE+="Build has Succeeded!%0A"
        MESSAGE+="Download at:%0A"
        MESSAGE+="https://github.com/${{ github.repository }}/releases/tag/${{ github.run_id }}"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TG_CHAT }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=Markdown" >/dev/null

      # Send Build 'status' notification (Fail/Cancel)
    - name: Telegram Build Failed
      if:  ${{ cancelled() || failure() }}
      continue-on-error: true
      run: |
        if [[ -z "${{ secrets.TG_TOKEN }}" || -z "${{ secrets.TG_CHAT }}" ]]; then
          echo "Telegram credentials not configured, skipping notification."
          exit 0
        fi
        if [[ "${{ job.status }}" == "cancelled" ]]; then
          JOB_MSG="has been Cancelled!"
        else
          JOB_MSG="has Failed!"
        fi
        MESSAGE="Crave Project: ${{ github.event.inputs.BASE_PROJECT }}%0A"
        MESSAGE+="Device: ${{ github.event.inputs.DEVICE }}%0A"
        MESSAGE+="Build $JOB_MSG%0A"
        MESSAGE+="Check logs at:%0A"
        MESSAGE+="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TG_CHAT }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=Markdown" >/dev/null

      # Only reach this wheter the user killed the workflow.
    - name: Execute if the job is cancelled
      if: ${{ cancelled() }}
      run: |
        cd $PROJECTFOLDER
        crave stop --all

      # Upload build artifacts to GitHub Releases + GoFile + PixelDrain
    - name: Upload build artifacts
      if: ${{ success() }}
      run: |
        cd $PROJECTFOLDER
        echo "${{ secrets.GITHUB_TOKEN }}" > token.txt
        crave push token.txt -d $(crave ssh -- pwd | grep -v Select | sed -s 's/\r//g')/
        crave ssh -- "export GH_UPLOAD_LIMIT="${{ secrets.GH_UPLOAD_LIMIT }}"; bash /opt/crave/github-actions/upload.sh '${{ github.run_id }}' '${{ github.event.inputs.DEVICE }}'  '${{ github.repository }}' '${{ github.event.inputs.PRODUCT_NAME }}-${{ github.run_id }}' '${{ secrets.EXTRA_FILES }}'"

        # Pull built files for GoFile/PixelDrain upload
        mkdir -p artifacts
        crave pull "out/target/product/${{ github.event.inputs.DEVICE }}/*.zip" artifacts/ || true
        crave pull "out/target/product/${{ github.event.inputs.DEVICE }}/*.img" artifacts/ || true

    - name: Upload to GoFile (success)
      if: ${{ success() }}
      continue-on-error: true
      run: |
        for FILE in artifacts/*.zip artifacts/*.img; do
          [ -f "$FILE" ] || continue
          echo "Uploading $FILE to GoFile..."
          mapfile -t SERVERS < <(curl -s https://api.gofile.io/servers | jq -r '.data.servers[].name')
          for S in $(printf "%s\n" "${SERVERS[@]}" | shuf); do
            RESP=$(curl -s -F "file=@${FILE}" "https://${S}.gofile.io/uploadFile")
            LINK=$(echo "$RESP" | jq -r '.data.downloadPage // empty')
            if [ -n "$LINK" ]; then
              echo "GoFile upload successful: $LINK"
              echo "GOFILE_URL=$LINK" >> $GITHUB_ENV
              break
            fi
          done
        done

    - name: Upload to PixelDrain (success)
      if: ${{ success() }}
      continue-on-error: true
      run: |
        if [[ -z "${{ secrets.PIXELDRAIN_TOKEN }}" ]]; then
          echo "PixelDrain token not configured, skipping."
          exit 0
        fi
        for FILE in artifacts/*.zip artifacts/*.img; do
          [ -f "$FILE" ] || continue
          echo "Uploading $FILE to PixelDrain..."
          RESPONSE=$(curl -s -u ":${{ secrets.PIXELDRAIN_TOKEN }}" -F "file=@$FILE" https://pixeldrain.com/api/file)
          FILE_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [[ "$FILE_ID" != "null" && -n "$FILE_ID" ]]; then
            URL="https://pixeldrain.com/u/$FILE_ID"
            echo "PixelDrain upload successful: $URL"
            echo "PIXELDRAIN_URL=$URL" >> $GITHUB_ENV
          else
            echo "PixelDrain upload failed: $RESPONSE"
          fi
        done

    - name: Telegram Upload Links
      if: ${{ success() }}
      continue-on-error: true
      run: |
        if [[ -z "${{ secrets.TG_TOKEN }}" || -z "${{ secrets.TG_CHAT }}" ]]; then
          exit 0
        fi
        MESSAGE="Build artifacts for ${{ github.event.inputs.DEVICE }}:%0A"
        MESSAGE+="GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ github.run_id }}%0A"
        if [[ -n "${{ env.GOFILE_URL }}" ]]; then
          MESSAGE+="GoFile: ${{ env.GOFILE_URL }}%0A"
        fi
        if [[ -n "${{ env.PIXELDRAIN_URL }}" ]]; then
          MESSAGE+="PixelDrain: ${{ env.PIXELDRAIN_URL }}"
        fi
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TG_CHAT }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=Markdown" >/dev/null

      # Pull Errors and Display them
    - name: Display error.log
      if: ${{ failure() }}
      id: errorlog
      run: |
        cd $PROJECTFOLDER
        crave ssh -- sleep 1
        crave pull out/error.log . || true
        echo "Displaying out/error.log"
        cat out/error.log

    - name: Upload error log to GoFile
      if: ${{ failure() }}
      continue-on-error: true
      run: |
        if [ ! -f error.log ]; then
          echo "No error.log found"
          exit 0
        fi
        echo "Uploading error.log to GoFile..."
        mapfile -t SERVERS < <(curl -s https://api.gofile.io/servers | jq -r '.data.servers[].name')
        for S in $(printf "%s\n" "${SERVERS[@]}" | shuf); do
          RESP=$(curl -s -F "file=@error.log" "https://${S}.gofile.io/uploadFile")
          LINK=$(echo "$RESP" | jq -r '.data.downloadPage // empty')
          if [ -n "$LINK" ]; then
            echo "GoFile error log: $LINK"
            echo "GOFILE_ERROR_URL=$LINK" >> $GITHUB_ENV
            break
          fi
        done

    - name: Upload error log to PixelDrain
      if: ${{ failure() }}
      continue-on-error: true
      run: |
        if [[ -z "${{ secrets.PIXELDRAIN_TOKEN }}" ]]; then
          echo "PixelDrain token not configured, skipping."
          exit 0
        fi
        if [ ! -f error.log ]; then
          echo "No error.log found"
          exit 0
        fi
        echo "Uploading error.log to PixelDrain..."
        RESPONSE=$(curl -s -u ":${{ secrets.PIXELDRAIN_TOKEN }}" -F "file=@error.log" https://pixeldrain.com/api/file)
        FILE_ID=$(echo "$RESPONSE" | jq -r '.id')
        if [[ "$FILE_ID" != "null" && -n "$FILE_ID" ]]; then
          URL="https://pixeldrain.com/u/$FILE_ID"
          echo "PixelDrain error log: $URL"
          echo "PIXELDRAIN_ERROR_URL=$URL" >> $GITHUB_ENV
        else
          echo "PixelDrain upload failed: $RESPONSE"
        fi

    - name: Telegram Error Links
      if: ${{ failure() }}
      continue-on-error: true
      run: |
        if [[ -z "${{ secrets.TG_TOKEN }}" || -z "${{ secrets.TG_CHAT }}" ]]; then
          exit 0
        fi
        MESSAGE="Build for ${{ github.event.inputs.DEVICE }} FAILED%0A"
        MESSAGE+="Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A"
        if [[ -n "${{ env.GOFILE_ERROR_URL }}" ]]; then
          MESSAGE+="Error log (GoFile): ${{ env.GOFILE_ERROR_URL }}%0A"
        fi
        if [[ -n "${{ env.PIXELDRAIN_ERROR_URL }}" ]]; then
          MESSAGE+="Error log (PixelDrain): ${{ env.PIXELDRAIN_ERROR_URL }}"
        fi
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TG_CHAT }}" \
          -d "text=$MESSAGE" \
          -d "parse_mode=Markdown" >/dev/null
